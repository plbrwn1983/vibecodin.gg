name: Sync Contributions

on:
  push:
    branches: [main]
    paths:
      - "contributions/**"

  # Allow manual trigger for full re-sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get hub labels from merged PR
        id: labels
        run: |
          # Find the PR that was just merged (the commit that triggered this push)
          COMMIT_SHA=${{ github.sha }}
          PR_DATA=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" --jq '.[0].labels[].name' 2>/dev/null || echo "")
          HUB_LABELS=$(echo "$PR_DATA" | grep '^hub:' | tr '\n' ',' | sed 's/,$//')
          echo "hub_labels=$HUB_LABELS" >> $GITHUB_OUTPUT
          echo "Found hub labels: $HUB_LABELS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run sync pipeline
        run: npx tsx scripts/sync.ts . "${{ steps.labels.outputs.hub_labels }}"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
